<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TyF Blox</title>

<style>
body {
  background:#000;
  color:#fff;
  font-family:Arial;
}

header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#000;
}

.tabs {
  display:flex;
  gap:10px;
  list-style:none;
}

.tabs li {
  background:#333;
  padding:8px 15px;
  cursor:pointer;
  border-radius:8px;
}

.tabs li.active {
  background:#ffeb3b;
  color:#000;
}

.search-bar {
  display:flex;
}

.search-bar input {
  padding:8px;
}

.search-bar button {
  padding:8px;
}

.avatar-btn {
  width:40px;
  height:40px;
  border-radius:50%;
  background:#ffeb3b;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.avatar-dropdown {
  position:absolute;
  background:#111;
  padding:10px;
  display:none;
  right:0;
}

.avatar-dropdown.show {
  display:block;
}

.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
}

.modal-content {
  background:#111;
  margin:10% auto;
  padding:20px;
  max-width:400px;
}

.hidden {
  display:none;
}
</style>
</head>

<body>

<header>
  <div>TyF Blox</div>

  <ul class="tabs">
    <li class="active" data-tab="home">Início</li>
    <li data-tab="games">Jogos</li>
  </ul>

  <div style="display:flex;gap:10px;">
    <form class="search-bar">
      <input type="text">
      <button>Buscar</button>
    </form>

    <div style="position:relative;">
      <button id="avatarBtn" class="avatar-btn">C</button>

      <div id="dropdown" class="avatar-dropdown">
        <div id="userInfo" class="hidden">
          <b id="userName"></b>
        </div>

        <button id="loginBtn">Entrar</button>
        <button id="registerBtn">Registrar</button>

        <button id="profileBtn" class="hidden">Perfil</button>
        <button id="logoutBtn" class="hidden">Sair</button>
      </div>
    </div>
  </div>
</header>

<main>

<section id="home">
<h1>Home</h1>
</section>

<section id="games" class="hidden">
<h1>Jogos</h1>

<div>
  <div>Blox Fruits</div>
  <div>Adopt Me</div>
  <div>Brookhaven</div>
</div>

</section>

</main>

<!-- MODAL LOGIN -->
<div id="modal" class="modal">
<div class="modal-content">

<button onclick="closeModal()">X</button>

<div>
<button onclick="showLogin()">Login</button>
<button onclick="showRegister()">Registrar</button>
</div>

<form id="loginForm">
<input id="loginUser" placeholder="Usuário">
<input id="loginPass" type="password" placeholder="Senha">
<button>Entrar</button>
</form>

<form id="registerForm" class="hidden">
<input id="regUser" placeholder="Usuário">
<input id="regPass" type="password" placeholder="Senha">
<input id="regEmail" placeholder="Email">
<button>Registrar</button>
</form>

</div>
</div>

<script>

// ===================
// TABS
// ===================
document.querySelectorAll(".tabs li").forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll(".tabs li").forEach(t=>t.classList.remove("active"))
    tab.classList.add("active")

    document.querySelectorAll("main section").forEach(s=>s.classList.add("hidden"))
    document.getElementById(tab.dataset.tab).classList.remove("hidden")
  }
})

// ===================
// DROPDOWN
// ===================
const avatarBtn = document.getElementById("avatarBtn")
const dropdown = document.getElementById("dropdown")

avatarBtn.onclick=(e)=>{
  e.stopPropagation()
  dropdown.classList.toggle("show")
}

document.onclick=()=>{
  dropdown.classList.remove("show")
}

// ===================
// MODAL
// ===================
const modal = document.getElementById("modal")

function openModal(){ modal.style.display="block" }
function closeModal(){ modal.style.display="none" }

// ===================
// TROCA FORM
// ===================
const loginForm = document.getElementById("loginForm")
const registerForm = document.getElementById("registerForm")

function showLogin(){
  loginForm.classList.remove("hidden")
  registerForm.classList.add("hidden")
}

function showRegister(){
  loginForm.classList.add("hidden")
  registerForm.classList.remove("hidden")
}

// ===================
// BOTÕES
// ===================
document.getElementById("loginBtn").onclick=()=>{
  openModal()
  showLogin()
}

document.getElementById("registerBtn").onclick=()=>{
  openModal()
  showRegister()
}

// ===================
// LOGIN FAKE (FRONT)
// ===================
function setUser(user){
  localStorage.setItem("user", JSON.stringify(user))
  updateUI()
}

function getUser(){
  return JSON.parse(localStorage.getItem("user"))
}

function logout(){
  localStorage.removeItem("user")
  updateUI()
}

// ===================
// UPDATE UI
// ===================
function updateUI(){
  const user = getUser()

  if(user){
    document.getElementById("userInfo").classList.remove("hidden")
    document.getElementById("userName").innerText=user.username

    avatarBtn.innerText=user.username[0].toUpperCase()

    document.getElementById("loginBtn").classList.add("hidden")
    document.getElementById("registerBtn").classList.add("hidden")
    document.getElementById("profileBtn").classList.remove("hidden")
    document.getElementById("logoutBtn").classList.remove("hidden")
  }else{
    document.getElementById("userInfo").classList.add("hidden")

    avatarBtn.innerText="C"

    document.getElementById("loginBtn").classList.remove("hidden")
    document.getElementById("registerBtn").classList.remove("hidden")
    document.getElementById("profileBtn").classList.add("hidden")
    document.getElementById("logoutBtn").classList.add("hidden")
  }
}

// ===================
// LOGIN
// ===================
loginForm.onsubmit=(e)=>{
  e.preventDefault()

  const user=document.getElementById("loginUser").value
  const pass=document.getElementById("loginPass").value

  if(!user || !pass){
    alert("Preencha tudo")
    return
  }

  setUser({username:user})
  closeModal()
}

// ===================
// REGISTER
// ===================
registerForm.onsubmit=(e)=>{
  e.preventDefault()

  const user=document.getElementById("regUser").value
  const pass=document.getElementById("regPass").value
  const email=document.getElementById("regEmail").value

  if(user.length<3){
    alert("Usuário curto")
    return
  }

  if(pass.length<8){
    alert("Senha fraca")
    return
  }

  setUser({username:user})
  closeModal()
}

// ===================
document.getElementById("logoutBtn").onclick=logout

updateUI()

</script>

</body>
</html>
