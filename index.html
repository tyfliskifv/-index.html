<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TyF Blox</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --surface: #111100;
      --surface-2: #1b1b00;
      --card: #333300;
      --primary: #ffeb3b;
      --primary-hover: #fdd835;
      --text: #f5f5f5;
      --muted: #d8d8d8;
      --border: rgba(255, 235, 59, 0.35);
      --shadow: 0 0 20px rgba(255, 235, 59, 0.2);
      --danger: #ff8a80;
      --success: #9cffac;
      --info: #9ad7ff;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #000000 0%, #080800 100%);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      background-color: rgba(0, 0, 0, 0.95);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .menu-btn {
      width: 44px;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: 0 0 10px rgba(255, 235, 59, 0.12);
    }

    .menu-btn:hover {
      background: var(--primary);
      color: #000;
      transform: translateY(-1px);
    }

    .menu-btn svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .logo {
      font-weight: 900;
      font-size: 1.8rem;
      color: var(--primary);
      user-select: none;
      flex-shrink: 0;
      letter-spacing: 0.5px;
      text-shadow: 0 0 12px rgba(255, 235, 59, 0.25);
    }

    nav {
      flex-grow: 1;
    }

    .tabs {
      display: flex;
      gap: 15px;
      list-style: none;
      align-items: center;
    }

    .tabs li {
      cursor: pointer;
      padding: 10px 16px;
      border-radius: 10px;
      background-color: var(--card);
      color: var(--text);
      font-weight: 600;
      transition: all 0.25s ease;
      border: 1px solid transparent;
    }

    .tabs li:hover,
    .tabs li.active {
      background-color: var(--primary);
      color: #000000;
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(255, 235, 59, 0.2);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search-bar {
      display: flex;
      max-width: 320px;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 14px rgba(255, 235, 59, 0.18);
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .search-bar input[type="text"] {
      flex: 1;
      padding: 11px 15px;
      border: none;
      font-size: 1rem;
      background-color: var(--surface);
      color: var(--text);
      outline: none;
    }

    .search-bar input[type="text"]::placeholder {
      color: #bdb76b;
    }

    .search-bar button {
      background-color: var(--primary);
      border: none;
      color: #000000;
      font-weight: 700;
      padding: 0 15px;
      cursor: pointer;
      font-size: 1rem;
      transition: background-color 0.3s ease;
    }

    .search-bar button:hover {
      background-color: var(--primary-hover);
    }

    .avatar-wrapper {
      position: relative;
    }

    .avatar-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      color: #000;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(255, 235, 59, 0.25);
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .avatar-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .avatar-dropdown {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      min-width: 220px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 10px;
      display: none;
      z-index: 50;
    }

    .avatar-dropdown.show {
      display: block;
    }

    .dropdown-user {
      padding: 8px 10px 10px;
      border-bottom: 1px solid rgba(255,235,59,0.15);
      margin-bottom: 8px;
    }

    .dropdown-user strong {
      color: var(--primary);
      display: block;
      line-height: 1.2;
    }

    .dropdown-user small {
      color: var(--muted);
      word-break: break-word;
    }

    .dropdown-item {
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text);
      text-align: left;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.2s ease;
    }

    .dropdown-item:hover {
      background: var(--card);
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 90;
    }

    .sidebar-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 290px;
      max-width: 85vw;
      height: 100vh;
      background: linear-gradient(180deg, #0a0a00 0%, #141400 100%);
      border-right: 1px solid var(--border);
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);
      transform: translateX(-100%);
      transition: transform 0.28s ease;
      z-index: 100;
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .sidebar.show {
      transform: translateX(0);
    }

    .sidebar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255, 235, 59, 0.18);
    }

    .sidebar-title {
      color: var(--primary);
      font-size: 1.2rem;
      font-weight: 800;
    }

    .sidebar-close {
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      color: var(--primary);
      cursor: pointer;
      font-size: 1.4rem;
      line-height: 1;
    }

    .sidebar-close:hover {
      background: var(--primary);
      color: #000;
    }

    .sidebar-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sidebar-link {
      border: 1px solid rgba(255, 235, 59, 0.15);
      background: var(--card);
      color: var(--text);
      text-decoration: none;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: 700;
      transition: 0.25s ease;
      cursor: pointer;
    }

    .sidebar-link:hover {
      background: var(--primary);
      color: #000;
      transform: translateX(3px);
    }

    .sidebar-info {
      margin-top: auto;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 235, 59, 0.18);
      color: var(--muted);
      font-size: 0.92rem;
    }

    main {
      max-width: 1100px;
      margin: 36px auto;
      padding: 0 20px 30px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(255, 235, 59, 0.12), rgba(255, 235, 59, 0.03));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }

    .hero h1 {
      color: var(--primary);
      margin-bottom: 8px;
      font-size: 2rem;
    }

    .hero p {
      color: var(--muted);
      max-width: 760px;
    }

    .social-container {
      background-color: var(--surface);
      border-radius: 16px;
      padding: 22px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-top: 20px;
    }

    .social-links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .social-card {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--text);
      background: var(--card);
      border: 1px solid rgba(255, 235, 59, 0.12);
      border-radius: 14px;
      padding: 16px;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .social-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
      border-color: var(--border);
    }

    .social-card strong {
      display: block;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .social-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .social-icon {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 235, 59, 0.12);
      flex-shrink: 0;
      color: var(--primary);
    }

    .social-icon svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .ads-container {
      background-color: var(--surface);
      border-radius: 16px;
      padding: 22px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .ads-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 18px;
    }

    .ads-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .ad-item {
      background-color: var(--card);
      border-radius: 14px;
      box-shadow: 0 0 10px rgba(255, 235, 59, 0.14);
      padding: 15px;
      color: var(--text);
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255, 235, 59, 0.12);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .ad-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.25);
    }

    .ad-item img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 12px;
      object-fit: cover;
      height: 150px;
      background: #0e0e00;
    }

    .ad-item h3 {
      font-size: 1.1rem;
      margin-bottom: 6px;
      color: var(--primary);
    }

    .ad-item p {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 14px;
      text-align: left;
      flex: 1;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .buy-btn,
    .primary-btn,
    .secondary-btn,
    .danger-btn {
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease, opacity 0.2s ease;
      width: 100%;
    }

    .buy-btn,
    .primary-btn {
      background-color: var(--primary);
      color: #000000;
    }

    .buy-btn:hover,
    .primary-btn:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
    }

    .secondary-btn {
      background-color: #2b2b10;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .secondary-btn:hover {
      background-color: #353514;
      transform: translateY(-1px);
    }

    .danger-btn {
      background-color: #4b1d1d;
      color: #ffd7d7;
      border: 1px solid rgba(255, 138, 128, 0.35);
    }

    .danger-btn:hover {
      background-color: #622626;
      transform: translateY(-1px);
    }

    .hidden {
      display: none !important;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.82);
      padding: 20px;
    }

    .modal-content {
      background-color: var(--surface);
      margin: 4% auto;
      padding: 22px;
      border-radius: 16px;
      max-width: 560px;
      color: var(--text);
      position: relative;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .modal-content img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 15px;
      max-height: 260px;
      object-fit: cover;
    }

    .modal-content h3 {
      margin-bottom: 10px;
      color: var(--primary);
      font-size: 1.4rem;
    }

    .modal-content p {
      margin-bottom: 15px;
      color: var(--muted);
    }

    .product-list {
      min-height: 70px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      color: var(--text);
      background: var(--surface-2);
    }

    .product-list ul {
      padding-left: 18px;
      color: var(--muted);
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 28px;
      font-weight: bold;
      color: var(--primary);
      cursor: pointer;
      line-height: 1;
    }

    #chatBox {
      display: none;
      background-color: #222200;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      height: 260px;
      overflow: hidden;
      color: var(--text);
      font-size: 0.92rem;
      margin: 10px 0;
      flex-direction: column;
      gap: 10px;
    }

    #chatMessages {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
    }

    #chatMessages p {
      margin-bottom: 8px;
    }

    #chatForm {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #chatForm button {
      width: auto;
      padding: 10px 14px;
      flex-shrink: 0;
    }

    .auth-modal-box {
      max-width: 460px;
    }

    .accounts-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .accounts-tabs button {
      flex: 1;
      min-width: 100px;
      padding: 10px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      border-radius: 10px;
      transition: 0.25s ease;
    }

    .accounts-tabs .active {
      background-color: var(--primary);
      color: #000;
    }

    .accounts-tabs button:not(.active) {
      background-color: var(--card);
      color: var(--text);
    }

    .accounts-form label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .accounts-form input,
    #chatInput,
    #reviewText,
    #reviewImageInput {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background-color: #0f0f00;
      color: var(--text);
      outline: none;
    }

    .accounts-form input:focus,
    #chatInput:focus,
    #reviewText:focus,
    #reviewImageInput:focus,
    .search-bar input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255, 235, 59, 0.12);
    }

    .accounts-form button,
    #chatForm button,
    #logoutBtn {
      width: 100%;
      padding: 10px;
      background-color: var(--primary);
      border: none;
      color: #000;
      font-weight: 700;
      cursor: pointer;
      border-radius: 10px;
      transition: background-color 0.25s ease;
    }

    .accounts-form button:hover,
    #chatForm button:hover,
    #logoutBtn:hover {
      background-color: var(--primary-hover);
    }

    .message {
      margin-top: 10px;
      min-height: 22px;
      font-size: 0.95rem;
    }

    .review-summary {
      background: linear-gradient(135deg, rgba(255, 235, 59, 0.12), rgba(255, 235, 59, 0.04));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      margin-bottom: 22px;
      text-align: center;
      box-shadow: 0 0 16px rgba(255, 235, 59, 0.12);
    }

    .review-summary-value {
      font-size: 2.3rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 8px;
    }

    .review-summary-stars {
      font-size: 1.7rem;
      color: #fff59d;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .review-summary-text {
      color: var(--muted);
      font-size: 0.98rem;
    }

    .review-form-box {
      background-color: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 22px;
    }

    .review-form-box h3 {
      color: var(--primary);
      margin-bottom: 10px;
    }

    .review-help {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 14px;
    }

    .star-selector {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
      flex-wrap: wrap;
      min-height: 44px;
    }

    .star-btn {
      appearance: none;
      border: none;
      background: transparent;
      color: #fff59d;
      font-size: 2.2rem;
      line-height: 1;
      cursor: pointer;
      padding: 2px;
      transition: transform 0.15s ease, color 0.15s ease, text-shadow 0.15s ease;
      user-select: none;
    }

    .star-btn:hover {
      transform: scale(1.08);
    }

    .star-btn.active,
    .star-btn.hovered {
      color: var(--primary);
      text-shadow: 0 0 10px rgba(255, 235, 59, 0.45);
    }

    .star-btn:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 4px;
      border-radius: 6px;
    }

    .star-selector-label {
      width: 100%;
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .review-meta {
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 10px;
    }

    .review-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .review-card-name {
      font-weight: 700;
      color: var(--primary);
    }

    .review-card-stars {
      color: #fff59d;
      font-size: 1.05rem;
      letter-spacing: 1px;
    }

    .review-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .review-actions button {
      flex: 1;
      min-width: 120px;
    }

    .review-image {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid rgba(255, 235, 59, 0.14);
      margin: 6px 0 12px;
      background: #0e0e00;
    }

    .review-preview-box {
      margin-top: 6px;
      margin-bottom: 12px;
      display: none;
    }

    .review-preview-box.show {
      display: block;
    }

    .review-preview-box img {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid rgba(255, 235, 59, 0.16);
      background: #0e0e00;
      margin-bottom: 10px;
    }

    .review-form-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .review-form-actions button {
      flex: 1;
      min-width: 140px;
    }

    .review-edit-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(154, 215, 255, 0.14);
      color: var(--info);
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 10px;
      border: 1px solid rgba(154, 215, 255, 0.25);
    }

    footer {
      padding: 22px;
      text-align: center;
      color: #cfcfcf;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    @media (max-width: 900px) {
      main {
        max-width: 100%;
        padding: 0 12px 24px;
      }
    }

    @media (max-width: 600px) {
      header {
        justify-content: center;
        gap: 10px;
        padding: 16px;
      }

      .header-left {
        width: 100%;
        justify-content: center;
      }

      nav {
        order: 2;
        width: 100%;
      }

      .tabs {
        justify-content: center;
        flex-wrap: wrap;
      }

      .header-actions {
        order: 1;
        width: 100%;
        justify-content: center;
      }

      .search-bar {
        max-width: 100%;
      }

      .hero h1 {
        font-size: 1.6rem;
      }

      .ad-item {
        min-width: 100%;
      }

      .modal-content {
        margin-top: 20px;
        padding: 18px;
      }

      #chatForm {
        flex-direction: column;
      }

      #chatForm button {
        width: 100%;
      }

      .sidebar {
        width: 260px;
      }
    }
  </style>
</head>
<body>
  <div id="sidebarOverlay" class="sidebar-overlay"></div>

  <aside id="sidebar" class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-title">Menu</div>
      <button id="closeSidebarBtn" class="sidebar-close" type="button">&times;</button>
    </div>

    <div class="sidebar-links">
